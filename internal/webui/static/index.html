<!doctype html>
<html lang="en" data-theme="{{THEME}}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FileCrusher</title>
    <link rel="stylesheet" href="/static/app.css" />
    <link rel="stylesheet" href="/static/modern.css" />
    <script>
    if (document.documentElement.dataset.theme === 'modern') {
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap';
      document.head.appendChild(l);
    }
    </script>
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div class="brand">
          <i data-lucide="hard-drive" class="brand-icon"></i>
          FileCrusher
          <span id="appVersion" class="version">{{VERSION}}</span>
        </div>
        <button id="logout" class="btn ghost" hidden>
          <i data-lucide="log-out" class="btn-icon"></i>
          <span class="btn-label">Logout</span>
        </button>
      </header>

      <section id="login" class="card login-card">
        <div class="login-header">
          <i data-lucide="shield" class="login-icon"></i>
          <h1>Sign in</h1>
          <p class="login-sub">Access your files securely</p>
        </div>
        <form id="loginForm">
          <label>
            <span>Username</span>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </label>
          <label>
            <span>Password</span>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </label>
          <button class="btn" type="submit">Login</button>
          <p id="loginErr" class="err" aria-live="polite"></p>
        </form>
      </section>

      <section id="files" class="card" hidden>
        <div class="row toolbar">
           <div class="path" id="cwd"></div>
           <div class="actions">
             <button id="newFolder" class="btn secondary" type="button">
               <i data-lucide="folder-plus" class="btn-icon"></i>
               <span class="btn-label">New folder</span>
             </button>
             <a id="downloadFolder" class="btn secondary" href="#">
               <i data-lucide="download" class="btn-icon"></i>
               <span class="btn-label">Download</span>
             </a>
             <label class="btn secondary">
               <i data-lucide="upload" class="btn-icon"></i>
               <span class="btn-label">Upload</span>
               <input id="upload" type="file" multiple hidden />
             </label>
             <button id="refresh" class="btn secondary" type="button">
               <i data-lucide="refresh-cw" class="btn-icon"></i>
               <span class="btn-label">Refresh</span>
             </button>
           </div>
         </div>

        <div id="uploads" class="uploads" hidden>
          <div class="uploadsTop">
            <div class="uploadsTitle">Uploads</div>
            <div id="uploadsSummary" class="uploadsSummary"></div>
          </div>
          <div id="uploadsList" class="uploadsList"></div>
        </div>

        <div class="row breadcrumbs" id="crumbs"></div>

        <table class="table" aria-label="Files">
          <thead>
            <tr>
              <th>Name</th>
              <th>Size</th>
              <th>Modified</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="tbody"></tbody>
        </table>

        <p id="filesErr" class="err" aria-live="polite"></p>
      </section>
    </main>

    <script src="/static/app.js"></script>
    <script>
    if (document.documentElement.dataset.theme === 'modern') {
      var s = document.createElement('script');
      s.src = 'https://unpkg.com/lucide@0.468.0/dist/umd/lucide.min.js';
      s.onload = function () { lucide.createIcons(); };
      document.body.appendChild(s);
    }
    </script>
  </body>
</html>
