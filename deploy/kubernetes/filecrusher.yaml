apiVersion: v1
kind: Namespace
metadata:
  name: filecrusher
---
apiVersion: v1
kind: Secret
metadata:
  name: filecrusher-admin
  namespace: filecrusher
type: Opaque
stringData:
  admin-password: "changeme"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filecrusher-config
  namespace: filecrusher
data:
  filecrusher.yaml: |
    log:
      level: "info"
    db:
      path: "/data/filecrusher.db"
    data_dir: "/data"
    http:
      bind: "0.0.0.0"
      port: 5132
      max_upload_mb: 512
      theme: "simple"
      tls:
        cert_path: ""
        key_path: ""
    ssh:
      bind: "0.0.0.0"
      port: 2022
      host_key_path: ""
    ftp:
      enable: false
      explicit_tls: false
      port: 2121
      passive_ports: "50000-50100"
      public_host: ""
    ftps:
      enable: false
      port: 2122
      passive_ports: ""
      public_host: ""
    ftps_implicit:
      enable: false
      port: 990
      passive_ports: ""
      public_host: ""
    webdav:
      enable: false
      prefix: "/webdav"
---
apiVersion: v1
kind: Service
metadata:
  name: filecrusher
  namespace: filecrusher
spec:
  type: ClusterIP
  selector:
    app: filecrusher
  ports:
    - name: https
      port: 5132
      targetPort: 5132
      protocol: TCP
    - name: sftp
      port: 2022
      targetPort: 2022
      protocol: TCP
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: filecrusher
  namespace: filecrusher
spec:
  serviceName: filecrusher
  replicas: 1
  selector:
    matchLabels:
      app: filecrusher
  template:
    metadata:
      labels:
        app: filecrusher
    spec:
      securityContext:
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      initContainers:
        - name: setup
          image: ghcr.io/yourorg/filecrusher:1.3.0
          command: ["sh", "-c"]
          args:
            - |
              if [ ! -f /data/filecrusher.db ]; then
                echo "first boot — running setup"
                /usr/local/bin/filecrusher setup \
                  --db /data/filecrusher.db \
                  --data-dir /data \
                  --admin-password-env
              fi
          env:
            - name: FILECRUSHER_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: filecrusher-admin
                  key: admin-password
          volumeMounts:
            - name: data
              mountPath: /data
      containers:
        - name: filecrusher
          image: ghcr.io/yourorg/filecrusher:1.3.0
          args: ["server", "--config", "/etc/filecrusher/filecrusher.yaml"]
          ports:
            - name: https
              containerPort: 5132
            - name: sftp
              containerPort: 2022
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/filecrusher
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: "2"
              memory: 512Mi
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: filecrusher-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
